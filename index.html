<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>5inco Store – Sistema de Gestión</title>
  <meta name="description" content="Sistema de gestión para local de ropa. Control de ventas, stock, empleados y deudores." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0f14" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

<!-- Supabase Loading Overlay -->
<div id="supabase-loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 15, 20, 0.75); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); z-index:99999; justify-content:center; align-items:center; flex-direction:column; color:white; font-family:'Inter', sans-serif;">
  <div style="width:48px; height:48px; border:4px solid rgba(255,255,255,0.08); border-top:4px solid #9b5de5; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:20px; box-shadow: 0 0 20px rgba(155, 93, 229, 0.3);"></div>
  <div id="supabase-loading-text" style="font-size:16px; font-weight:600; color:#e0e0e6; letter-spacing:0.5px;">Sincronizando con Supabase...</div>
</div>
<style>
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<button id="theme-toggle" class="btn-theme-toggle" title="Cambiar tema">
  <span class="theme-icon">🌙</span>
</button>

<!-- ═══════════════════════════ LOGIN ═══════════════════════════ -->
<div id="page-login" class="page active">
  <div class="login-bg">
    <div class="netflix-container" id="netflix-profile-selection">
      <h1 class="netflix-title">¿Quién está usando el sistema?</h1>
      <div class="netflix-profiles-grid" id="netflix-profiles-list">
        <!-- Rendered dynamically in app.js -->
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-change-pin-init" style="margin-top: 30px; opacity: 0.7;">⚙️ Cambiar PIN / Contraseña</button>
    </div>

    <!-- Netflix Pin Overlay -->
    <div class="netflix-pin-overlay" id="netflix-pin-overlay" style="display:none;">
      <div class="netflix-pin-card">
        <button class="netflix-pin-back" id="btn-pin-back">← Volver</button>
        <div class="netflix-avatar-large" id="pin-avatar-display">AT</div>
        <h2 id="pin-user-name">Andrea Tuta</h2>
        <p class="text-muted" style="font-size: 13px; margin-bottom: 20px;">Ingresá tu PIN de acceso</p>
        
        <form id="netflix-pin-form">
          <input type="password" id="login-pin-input" maxlength="8" placeholder="PIN" required autofocus autocomplete="off" />
          <div id="login-pin-error" class="alert-error" style="display:none; margin-top: 10px;"></div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top: 15px;">Ingresar ➔</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ APP SHELL ═══════════════════════════ -->
<div id="page-app" class="page">

  <!-- Mobile Header -->
  <div class="mobile-header" id="mobile-header">
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Abrir menú">☰</button>
    <div class="mobile-logo">
      <div class="logo-icon sm">5</div>
      <span>5inco</span>
    </div>
    <div class="mobile-user-name" id="mobile-user-name"></div>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon sm">5</div>
        <span>5inco Store</span>
      </div>
    </div>

    <div class="sidebar-user" id="sidebar-user-info"></div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">⏻ Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <!-- Views injected here -->
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
    <div class="mobile-nav-items" id="mobile-nav-items">
      <!-- Rendered dynamically in app.js -->
    </div>
  </nav>

</div>

<!-- ═══════════════════════════ MODALS ═══════════════════════════ -->
<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js?v=4"></script>
<script src="app.js?v=4"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(registration => {
        console.log('SW registrado con éxito:', registration.scope);
      }).catch(err => {
        console.log('Fallo el registro del SW:', err);
      });
    });
  }
</script>
</body>
</html>
